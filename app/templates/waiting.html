<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка... | {{ task_id }}</title>
    <meta http-equiv="refresh" content="2">
    <style>
        :root {
            --wait-color: #f59e0b;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Анимированный лоадер */
        .loader-container {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #fef3c7;
            border-bottom-color: var(--wait-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 700;
        }

        .status-badge {
            display: inline-block;
            background: #fffbeb;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            border: 1px solid #fef3c7;
        }

        .task-container {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .task-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .task-id {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .refresh-text {
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Эффект пульсации для текста обновления */
        .dot-pulse {
            width: 6px;
            height: 6px;
            background-color: var(--wait-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader-container">
            <span class="loader"></span>
        </div>
        
        <h2>Обработка...</h2>
        
        <div class="status-badge">
            {{ status }}
        </div>

        <div class="task-container">
            <span class="task-label">Код задачи</span>
            <span class="task-id">{{ task_id }}</span>
        </div>

        <div class="refresh-text">
            <div class="dot-pulse"></div>
            Страница обновится автоматически
        </div>
    </div>

</body>
</html>
