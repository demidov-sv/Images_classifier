<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обработка...</title>
    <meta http-equiv="refresh" content="2">
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; text-align: center; }
        .card { background: #fff3e0; padding: 30px; border-radius: 10px; border: 1px solid #ff9800; }
        .task-id { font-family: monospace; background: #fff; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⏳ Обрабатывается...</h2>
        <p>Задача: <span class="task-id">{{ task_id }}</span></p>
        <p>Статус: {{ status }}</p>
        <p style="font-size: 14px; color: #666;">Страница обновится автоматически</p>
    </div>
</body>
</html>
