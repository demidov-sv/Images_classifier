services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" 
      - "9001:9001" 
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - .:/app
      - db_data:/app/data
    depends_on:
      - redis
      - minio         

  worker:
    build: .
    command: celery -A celery_app worker --loglevel=info -P solo 
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - .:/app
      - db_data:/app/data
    depends_on:
      - redis
      - minio

volumes:
  minio_data:
  db_data: