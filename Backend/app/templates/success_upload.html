<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Файл загружен | {{ name }}</title>
    <style>
        :root {
            --primary-color: #10b981;
            --primary-hover: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-success {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background-color: #ecfdf5;
            color: var(--primary-color);
            border-radius: 50%;
            margin-bottom: 20px;
            font-size: 32px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .task-container {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .task-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .task-id {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-hover);
            word-break: break-all;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-outline {
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn-outline:hover {
            color: var(--text-main);
        }

        .check-link {
            word-break: break-all;
            font-size: 13px;
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-success">✓</div>
        
        <h2>Успешно, {{ name }}!</h2>
        <p>Файл принят, задача уже в обработке.</p>

        <div class="task-container">
            <span class="task-label">ID задачи</span>
            <span class="task-id">{{ task_id }}</span>
        </div>

        <a href="{{ check_url }}" class="btn btn-primary">Проверить результат</a>
        
        <a href="/" class="btn btn-outline">← Загрузить еще один файл</a>
        
        <div style="margin-top: 10px;">
            <a href="{{ check_url }}" class="check-link">{{ check_url }}</a>
        </div>
    </div>

</body>
</html>
