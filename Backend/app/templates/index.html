<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Классификация изображений</title>
    <style>
        :root {
            --primary-color: #3b82f6; /* Синий цвет для этапа ввода */
            --primary-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background-color: #eff6ff;
            color: var(--primary-color);
            border-radius: 12px;
            font-size: 28px;
            margin-bottom: 16px;
        }

        h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Стилизация загрузки файла */
        .file-upload {
            position: relative;
            display: block;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-upload:hover {
            border-color: var(--primary-color);
            background: #f8faff;
        }

        .file-upload input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        .file-upload-text strong {
            color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        small {
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="header-icon">👁‍🗨</div>
            <h2>Сервис классификации изображений</h2>
        </div>

        <form action="/send" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="name" placeholder="Введите имя..." required>
            </div>

            <div class="form-group">
                <label>Изображение</label>
                <div class="file-upload">
                    <input type="file" name="file" accept=".jpeg,.png" required onchange="updateFileName(this)">
                    <div class="file-upload-text" id="file-text">
                        <strong>Выберите файл</strong> или перетащите его сюда<br>
                        <span style="font-size: 12px;">JPEG или PNG</span>
                    </div>
                </div>
            </div>

            <button type="submit">Классифицировать</button>
        </form>

        <div class="footer">
            <small>Будем рады видеть вас снова!</small>
        </div>
    </div>

    <script>
        // Небольшой скрипт для отображения имени выбранного файла
        function updateFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : "Выберите файл или перетащите его сюда";
            document.getElementById('file-text').innerHTML = "Выбран файл:<br><strong>" + fileName + "</strong>";
        }
    </script>
</body>
</html>
