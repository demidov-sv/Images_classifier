<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; }
        .card { background: #e8f5e9; padding: 30px; border-radius: 10px; border: 1px solid #4caf50; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
        .high { color: #28a745; font-weight: bold; }
        .medium { color: #ffc107; font-weight: bold; }
        .low { color: #dc3545; font-weight: bold; }
        a { color: #1565c0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✅ Готово!</h2>
        <p>Файл: {{ filename }}</p>
        <p>Время: {{ processing_time }} мс</p>
        <p>Найдено: {{ count }} объектов</p>
        
        {% if objects %}
        <table>
            <tr><th>Объект</th><th>Уверенность</th></tr>
            {% for obj in objects %}
            <tr>
                <td>{{ obj.class }}</td>
                <td class="{% if obj.confidence > 0.8 %}high{% elif obj.confidence > 0.5 %}medium{% else %}low{% endif %}">
                    {{ "%.1f"|format(obj.confidence * 100) }}%
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>Ничего не найдено</p>
        {% endif %}
        
        <p style="margin-top: 20px;"><a href="/">← Загрузить ещё</a></p>
    </div>
</body>
</html>
